<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>recipes · eats by anya ✿</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Quicksand:wght@400;500;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="mobile.css" />
  <style>
    .vinyl-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      padding: 0 18px;
    }
    .vinyl {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: conic-gradient(
        var(--pink) 0deg, #e8c8e0 30deg, var(--blue) 60deg, #a8c8e0 90deg,
        var(--pink) 120deg, #e8c8e0 150deg, var(--blue) 180deg, #a8c8e0 210deg,
        var(--pink) 240deg, #e8c8e0 270deg, var(--blue) 300deg, #a8c8e0 330deg,
        var(--pink) 360deg
      );
      box-shadow: 0 8px 32px rgba(33,60,81,0.15);
      position: relative;
      cursor: pointer;
      animation: spin-vinyl 4s linear infinite;
      animation-play-state: paused;
    }
    .vinyl.playing { animation-play-state: running; }
    .vinyl::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 26px; height: 26px;
      background: var(--navy);
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(33,60,81,0.3);
    }
    @keyframes spin-vinyl {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .vinyl-label {
      font-size: 0.62rem;
      font-weight: 600;
      color: rgba(238,238,238,0.5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .vinyl-song {
      font-family: 'Playfair Display', serif;
      font-size: 0.75rem;
      color: var(--pink);
      font-style: italic;
      text-align: center;
      line-height: 1.4;
    }

    /* ── RECIPES PAGE ── */
    .recipes-hero {
      background: var(--white);
      padding: 52px 64px 40px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .recipes-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3vw, 3rem);
      color: var(--navy);
      margin-bottom: 6px;
    }
    .recipes-hero h1 span { font-style: italic; color: var(--blue); }
    .recipes-hero p { font-size: 0.95rem; color: #5a6a75; }

    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 28px 64px;
      background: var(--white);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .filter-btn {
      background: var(--cream);
      border: none;
      border-radius: 100px;
      padding: 8px 18px;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--navy);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .filter-btn:hover { background: var(--blue); color: #fff; }
    .filter-btn.active { background: var(--pink); color: var(--navy); }
    .filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #9ab;
      padding-right: 4px;
    }
    .filter-divider { width: 1px; height: 24px; background: rgba(0,0,0,0.1); margin: 0 6px; }
    .recipes-count {
      font-size: 0.78rem;
      color: #9ab;
      font-weight: 600;
      padding: 0 64px 0;
      margin-top: 32px;
      margin-bottom: 16px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- HAMBURGER BUTTON -->
<button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
  <span></span><span></span><span></span>
</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- ───── SIDEBAR ───── -->
<aside class="sidebar">
  <div class="logo-wrap">
    <div class="logo-icon">🌸</div>
    <div class="logo-name">eats by anya</div>
    <div class="logo-tagline">recipes & food stories</div>
  </div>

  <nav>
    <div class="nav-section-label">Explore</div>
    <a class="nav-link" href="index.html"><span class="nav-emoji">🏠</span> Home</a>
    <a class="nav-link active" href="recipes.html"><span class="nav-emoji">🍽️</span> Recipes</a>
    <a class="nav-link" href="about.html"><span class="nav-emoji">✨</span> About</a>
    <a class="nav-link" href="blog.html"><span class="nav-emoji">📝</span> Blog</a>
    <a class="nav-link" href="suggestions.html"><span class="nav-emoji">🍳</span> Suggestions</a>
  </nav>

  <div class="vinyl-wrap">
    <div class="vinyl" id="vinyl" onclick="toggleMusic()"></div>
    <div class="vinyl-label" id="vinyl-label">click to play</div>
    <div class="vinyl-song">More Than a Woman<br>Bee Gees</div>
  </div>
  <audio id="kitchen-audio" loop>
    <source src="More%20Than%20A%20Woman.mp3" type="audio/mpeg" />
  </audio>

  <div class="sidebar-socials">
    <a class="social-pill" href="https://www.instagram.com/eatsbyanya/"><svg role="img" viewBox="0 0 24 24" width="16" height="16" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="display:block;"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>
    <a class="social-pill" href="https://www.tiktok.com/@eatsbyanya"><svg role="img" viewBox="0 0 24 24" width="16" height="16" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="display:block;"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg></a>
  </div>
</aside>

<!-- ───── MAIN ───── -->
<main class="main">
  <div class="recipes-hero">
    <div class="hero-eyebrow">🍽️ the full collection</div>
    <h1>All <span>Recipes</span></h1>
    <p>Browse everything — filter by category, cuisine, or difficulty.</p>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">Category</span>
      <button class="filter-btn active" data-filter="category" data-value="all">All</button>
      <button class="filter-btn" data-filter="category" data-value="Breakfast">Breakfast</button>
      <button class="filter-btn" data-filter="category" data-value="Lunch">Lunch</button>
      <button class="filter-btn" data-filter="category" data-value="Dinner">Dinner</button>
      <button class="filter-btn" data-filter="category" data-value="Baking">Baking</button>
      <button class="filter-btn" data-filter="category" data-value="Drinks">Drinks</button>
      <button class="filter-btn" data-filter="category" data-value="Snacks">Snacks</button>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group">
      <span class="filter-label">Cuisine</span>
      <button class="filter-btn active" data-filter="cuisine" data-value="all">All</button>
      <button class="filter-btn" data-filter="cuisine" data-value="American">American</button>
      <button class="filter-btn" data-filter="cuisine" data-value="Asian">Asian</button>
      <button class="filter-btn" data-filter="cuisine" data-value="Italian">Italian</button>
      <button class="filter-btn" data-filter="cuisine" data-value="Indian">Indian</button>
      <button class="filter-btn" data-filter="cuisine" data-value="Mexican">Mexican</button>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group">
      <span class="filter-label">Difficulty</span>
      <button class="filter-btn active" data-filter="difficulty" data-value="all">All</button>
      <button class="filter-btn" data-filter="difficulty" data-value="Easy">Easy</button>
      <button class="filter-btn" data-filter="difficulty" data-value="Medium">Medium</button>
      <button class="filter-btn" data-filter="difficulty" data-value="Hard">Hard</button>
    </div>
  </div>

  <div class="content">
    <div class="recipes-count" id="recipes-count"></div>
    <div class="cards-grid" id="all-cards"></div>
  </div>

  <footer class="footer">
    made with <span>♡</span> by anya · @eatsbyanya
  </footer>
</main>

<script>
  // ── VINYL ──
  const audio = document.getElementById('kitchen-audio');
  const vinyl = document.getElementById('vinyl');
  const label = document.getElementById('vinyl-label');

  window.addEventListener('click', function startOnFirstInteraction() {
    audio.play();
    vinyl.classList.add('playing');
    label.textContent = 'now playing ♪';
    window.removeEventListener('click', startOnFirstInteraction);
  }, { once: true });

  function toggleMusic() {
    if (audio.paused) {
      audio.play(); vinyl.classList.add('playing'); label.textContent = 'now playing ♪';
    } else {
      audio.pause(); vinyl.classList.remove('playing'); label.textContent = 'click to play';
    }
  }

  // ── MOBILE NAV ──
  const menuToggle = document.getElementById('menu-toggle');
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebar-overlay');

  menuToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    menuToggle.classList.toggle('open');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
  });
  overlay.addEventListener('click', () => {
    menuToggle.classList.remove('open'); sidebar.classList.remove('open'); overlay.classList.remove('active');
  });
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      menuToggle.classList.remove('open'); sidebar.classList.remove('open'); overlay.classList.remove('active');
    });
  });

  // ── FILTERS ──
  const activeFilters = { category: 'all', cuisine: 'all', difficulty: 'all' };
  let allRecipes = [];
  const categoryColors = { Dinner:'1', Baking:'2', Breakfast:'3', Lunch:'1', Drinks:'2', Snacks:'3' };

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function buildCard(recipe) {
    const color = categoryColors[recipe.category] || '1';
    const difficultyColor = recipe.difficulty === 'Easy' ? 'pink' : recipe.difficulty === 'Medium' ? 'blue' : '';
    const imgContent = recipe.image
      ? `<img src="${recipe.image}" alt="${recipe.title}" style="width:100%;height:100%;object-fit:cover;display:block;" />`
      : `<span style="font-size:3.8rem;">${recipe.emoji || '🍽️'}</span>`;
    return `
      <a class="card" href="#">
        <div class="card-img card-img-${color}" style="${recipe.image ? 'padding:0;' : ''}">
          ${imgContent}
          <div class="card-badge">⏱ ${recipe.time}</div>
        </div>
        <div class="card-body">
          <div class="card-tags">
            <span class="tag ${difficultyColor}">${recipe.category}</span>
            <span class="tag">${recipe.difficulty}</span>
            <span class="tag">${recipe.cuisine}</span>
          </div>
          <h3>${recipe.title}</h3>
          <div class="card-meta">
            <span>🍽 ${recipe.servings} serving${recipe.servings !== 1 ? 's' : ''}</span>
            <span>📅 ${formatDate(recipe.date)}</span>
          </div>
        </div>
      </a>`;
  }

  function applyFilters() {
    const filtered = allRecipes.filter(r =>
      (activeFilters.category === 'all' || r.category === activeFilters.category) &&
      (activeFilters.cuisine === 'all' || r.cuisine === activeFilters.cuisine) &&
      (activeFilters.difficulty === 'all' || r.difficulty === activeFilters.difficulty)
    );
    const grid = document.getElementById('all-cards');
    const count = document.getElementById('recipes-count');
    grid.innerHTML = filtered.length
      ? filtered.map(buildCard).join('')
      : `<p style="color:#9ab; font-size:0.9rem; padding: 12px 0;">No recipes match those filters yet!</p>`;
    count.textContent = `${filtered.length} recipe${filtered.length !== 1 ? 's' : ''}`;
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const group = btn.dataset.filter;
      activeFilters[group] = btn.dataset.value;
      document.querySelectorAll(`.filter-btn[data-filter="${group}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    });
  });

  const params = new URLSearchParams(window.location.search);
  const presetCategory = params.get('category');
  if (presetCategory) {
    activeFilters.category = presetCategory;
    document.querySelectorAll('.filter-btn[data-filter="category"]').forEach(b => {
      b.classList.toggle('active', b.dataset.value === presetCategory);
    });
  }

  fetch('recipes.json')
    .then(r => r.json())
    .then(recipes => {
      allRecipes = recipes.sort((a, b) => new Date(b.date) - new Date(a.date));
      applyFilters();
    });
</script>
</body>
</html>
